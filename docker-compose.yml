services:
  falcon:
    build: .
    container_name: falcon-engine
    restart: unless-stopped
    environment:
      - GIT_USER_NAME=lixiorg
      - GIT_USER_EMAIL=lixiorg@users.noreply.github.com
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MODE=loop
    volumes:
      - .:/repo
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
